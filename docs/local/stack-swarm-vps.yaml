version: "3.8"

# =============================================================================
# Evo CRM Community — Stack Swarm VPS (Oracle Cloud aarch64)
# Última atualização: 2026-05-25 — bump para v1.0.0-rc4
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Gateway — Nginx reverse proxy
  # ---------------------------------------------------------------------------
  evo_gateway:
    image: lc1868/evo-crm-gateway:1.0.0-rc4
    environment:
      AUTH_UPSTREAM: "evo_auth:3001"
      CRM_UPSTREAM: "evo_crm:3000"
      CORE_UPSTREAM: "evo_core:5555"
      PROCESSOR_UPSTREAM: "evo_processor:8000"
      BOT_RUNTIME_UPSTREAM: "evo_bot_runtime:8080"
    networks:
      - network_swarm_public
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_swarm_public
        - traefik.http.routers.evo_gateway.rule=Host(`apievocrm.l2csolucoes.com.br`)
        - traefik.http.routers.evo_gateway.entrypoints=websecure
        - traefik.http.routers.evo_gateway.tls.certresolver=letsencryptresolver
        - traefik.http.services.evo_gateway.loadbalancer.server.port=3030
        - traefik.http.services.evo_gateway.loadbalancer.passHostHeader=true

