    command: sh -c "alembic stamp head || echo 'Already stamped'; alembic upgrade head || echo 'Migration skipped'; python -m scripts.run_seeders || echo 'Seeders skipped'; uvicorn src.main:app --host 0.0.0.0 --port 8000"
