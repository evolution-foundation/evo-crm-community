version: '3.8'

networks:
  evo-crm-community_default:
    external: true

services:
  # =============================================================================
  # CLICKHOUSE - Analytics Database
  # =============================================================================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: evo-campaign-clickhouse
    networks:
      - evo-crm-community_default
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./evo-flow/docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./evo-flow/docker/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # KAFKA - Streaming Platform
  # =============================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: evo-campaign-zookeeper
    networks:
      - evo-crm-community_default
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: evo-campaign-kafka
    networks:
      - evo-crm-community_default
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # TEMPORAL - Workflow Orchestration
  # =============================================================================
  temporal:
    image: temporalio/auto-setup:latest
    container_name: evo-campaign-temporal
    networks:
      - evo-crm-community_default
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USERNAME:-postgres}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-evoai_dev_password}
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig/development-sql.yaml
    volumes:
      - ./evo-flow/docker/temporal/development-sql.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml
    depends_on:
      - kafka

  # =============================================================================
  # EVO-FLOW (NestJS Application)
  # =============================================================================
  evo-flow:
    build:
      context: ./evo-flow
      dockerfile: Dockerfile
    container_name: evo-flow
    networks:
      - evo-crm-community_default
    ports:
      - "3334:3334"
    environment:
      - RUN_MODE=single
      - PORT=3334
      - QUEUE_MODE=kafka
      - WRITE_MODE=kafka
      - POSTGRES_DB_HOST=postgres
      - POSTGRES_DB_PORT=5432
      - POSTGRES_DB_USERNAME=${POSTGRES_USERNAME:-postgres}
      - POSTGRES_DB_PASSWORD=${POSTGRES_PASSWORD:-evoai_dev_password}
      - POSTGRES_DB_DATABASE=${POSTGRES_DATABASE:-evo_community}
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DATABASE=evo_campaign
      - CLICKHOUSE_USERNAME=default
      - CLICKHOUSE_PASSWORD=
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-evoai_redis_pass}
      - REDIS_DB=0
      - KAFKA_BROKERS=kafka:29092
      - EVOAI_CRM_BASE_URL=http://evo-crm:3000
      - EVO_AUTH_SERVICE_URL=http://evo-auth:3001
      - EVOAI_CRM_API_TOKEN=${EVOAI_CRM_API_TOKEN:-6e10e689-58ce-4416-bf0d-f5818bf2dcf8}
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: unless-stopped

volumes:
  clickhouse_data:
  zookeeper_data:
  kafka_data:
